interface:
  display_name: "Xingchen Next"
  short_description: "Stateful creator OS for code-first, approval-aware, multi-platform knowledge-opinion video production."
  default_prompt: >
    Use Xingchen Next as a source-to-video creator OS. Keep project-state.json
    canonical from screenshots, recordings, screen recordings, transcripts, notes,
    and source assets through director planning and final render jobs. Enforce
    approval gates, route precise proof/subtitle work through Remotion, treat
    VibeMotion and Hyperframes as motion-source/candidate layers, and use Spark
    only for justified spatial world plates.
